<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zemu — Test Çözme</title>
  <meta name="description" content="Zemu - İnteraktif test çözme platformu" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary: #0f0f13;
      --bg-card: #1a1a24;
      --bg-option: #22222e;
      --bg-option-hover: #2a2a3a;
      --text-primary: #f0f0f5;
      --text-secondary: #8888a0;
      --accent: #7c5cfc;
      --accent-glow: rgba(124, 92, 252, 0.25);
      --green: #34d399;
      --green-bg: rgba(52, 211, 153, 0.12);
      --red: #f87171;
      --red-bg: rgba(248, 113, 113, 0.12);
      --border: rgba(255, 255, 255, 0.06);
      --radius: 14px;
      --radius-sm: 10px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    /* ── Header ─────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #7c5cfc, #b47cfc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }

    .header-sub {
      color: var(--text-secondary);
      font-size: 13px;
    }

    /* ── Test Seçimi ────────────────── */
    .test-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .test-btn {
      background: var(--bg-option);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 18px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .test-btn:hover {
      background: var(--bg-option-hover);
      color: var(--text-primary);
    }

    .test-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    /* ── Kart ────────────────────────── */
    .kart {
      width: 100%;
      max-width: 640px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
    }

    .kart::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #7c5cfc, #b47cfc, #7c5cfc);
      background-size: 200% 100%;
      animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {

      0%,
      100% {
        background-position: 0% 0;
      }

      50% {
        background-position: 100% 0;
      }
    }

    /* ── Progress ────────────────────── */
    .progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c5cfc, #b47cfc);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .soru-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .soru-no {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .soru-sayac {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* ── Soru Metni ──────────────────── */
    .soru-metni {
      font-size: 18px;
      font-weight: 600;
      line-height: 1.6;
      margin-bottom: 24px;
      color: var(--text-primary);
    }

    .soru-metni img {
      max-width: 100%;
      border-radius: var(--radius-sm);
      margin: 12px 0;
      border: 1px solid var(--border);
    }

    /* ── Kategori Badge ─────────────────── */
    .kategori-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-left: 10px;
      vertical-align: middle;
    }

    .badge-temiz {
      background: rgba(52, 211, 153, 0.15);
      color: var(--green);
    }

    .badge-gorsel {
      background: rgba(96, 165, 250, 0.15);
      color: #60a5fa;
    }

    .badge-bozuk {
      background: rgba(251, 146, 60, 0.15);
      color: #fb923c;
    }

    /* ── Soru Görseli ───────────────────── */
    .soru-gorsel {
      width: 100%;
      margin-bottom: 20px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
    }

    .soru-gorsel img {
      width: 100%;
      display: block;
    }

    .gorsel-placeholder {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
      background: rgba(255, 255, 255, 0.02);
      border: 2px dashed rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-sm);
      margin-bottom: 20px;
    }

    .gorsel-placeholder .icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .bozuk-uyari {
      padding: 10px 16px;
      background: rgba(251, 146, 60, 0.08);
      border: 1px solid rgba(251, 146, 60, 0.2);
      border-radius: var(--radius-sm);
      color: #fb923c;
      font-size: 13px;
      margin-bottom: 16px;
      text-align: center;
    }

    /* ── Seçenekler ──────────────────── */
    .secenekler {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }

    .secenek {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: var(--bg-option);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 15px;
      color: var(--text-primary);
      user-select: none;
    }

    .secenek:hover {
      background: var(--bg-option-hover);
      border-color: rgba(124, 92, 252, 0.3);
      transform: translateX(4px);
    }

    .secenek .harf {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-weight: 700;
      font-size: 13px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-secondary);
      flex-shrink: 0;
      transition: all 0.2s ease;
    }

    .secenek.selected {
      border-color: var(--accent);
      background: rgba(124, 92, 252, 0.1);
    }

    .secenek.selected .harf {
      background: var(--accent);
      color: white;
    }

    .secenek.dogru-goster {
      border-color: var(--green);
      background: var(--green-bg);
    }

    .secenek.dogru-goster .harf {
      background: var(--green);
      color: #0f0f13;
    }

    .secenek.yanlis-goster {
      border-color: var(--red);
      background: var(--red-bg);
    }

    .secenek.yanlis-goster .harf {
      background: var(--red);
      color: #0f0f13;
    }

    /* ── Butonlar ────────────────────── */
    .butonlar {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .btn-primary {
      background: linear-gradient(135deg, #7c5cfc, #9d7cfc);
      color: white;
      box-shadow: 0 4px 16px var(--accent-glow);
      flex: 1;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px var(--accent-glow);
    }

    .btn-nav {
      background: var(--bg-option);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      width: 44px;
      height: 44px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .btn-nav:hover:not(:disabled) {
      background: var(--bg-option-hover);
      color: var(--text-primary);
    }

    .ipucu-kutusu {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(139, 92, 246, 0.12);
      border: 1px solid rgba(139, 92, 246, 0.35);
      color: #ddd;
      font-size: 14px;
      line-height: 1.5;
    }

    #ipucuBtn {
      background: #2b2540;
      color: #ddd;
    }

    /* ── Sonuç ───────────────────────── */
    .sonuc {
      margin-top: 16px;
      padding: 14px 18px;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      text-align: center;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .sonuc.dogru {
      display: block;
      background: var(--green-bg);
      color: var(--green);
      border: 1px solid rgba(52, 211, 153, 0.2);
    }

    .sonuc.yanlis {
      display: block;
      background: var(--red-bg);
      color: var(--red);
      border: 1px solid rgba(248, 113, 113, 0.2);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Skor ────────────────────────── */
    .skor-bar {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 20px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }

    .skor-item {
      text-align: center;
    }

    .skor-item .sayi {
      font-size: 20px;
      font-weight: 800;
    }

    .skor-item .etiket {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .skor-item.dogru-skor .sayi {
      color: var(--green);
    }

    .skor-item.yanlis-skor .sayi {
      color: var(--red);
    }

    .skor-item.toplam-skor .sayi {
      color: var(--accent);
    }

    /* ── Yükleniyor ──────────────────── */
    .yukleniyor {
      text-align: center;
      color: var(--text-secondary);
      padding: 60px 20px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Responsive ──────────────────── */
    @media (max-width: 480px) {
      body {
        padding: 20px 12px;
      }

      .kart {
        padding: 20px;
      }

      .soru-metni {
        font-size: 16px;
      }
    }

    /* ── Zemu Yardımcı Karakter ───────────────── */
    .zemu-widget {
      position: fixed;
      right: max(18px, calc(50vw - 550px));
      bottom: 22px;
      width: 220px;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      pointer-events: none;
    }

    .zemu-widget * {
      pointer-events: auto;
    }

    .zemu-character {
      width: 155px;
      height: auto;
      user-select: none;
      pointer-events: none;
      filter: drop-shadow(0 18px 28px rgba(0, 0, 0, 0.35));
      animation: zemuFloat 3.2s ease-in-out infinite;
    }

    .zemu-actions {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    #ipucuBtn.zemu-hint-btn,
    #zemuBtn.zemu-ask-btn {
      border: 1px solid rgba(180, 124, 252, 0.35);
      background: linear-gradient(135deg, rgba(124, 92, 252, 0.95), rgba(180, 124, 252, 0.95));
      color: white;
      padding: 10px 15px;
      border-radius: 999px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(124, 92, 252, 0.28);
      transition: all 0.2s ease;
      backdrop-filter: blur(12px);
    }

    #zemuBtn.zemu-ask-btn {
      background: rgba(34, 34, 46, 0.92);
      color: #d8c7ff;
    }

    #ipucuBtn.zemu-hint-btn:hover,
    #zemuBtn.zemu-ask-btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 12px 30px rgba(124, 92, 252, 0.38);
    }

    .zemu-bubble {
      width: 220px;
      padding: 14px 16px;
      border-radius: 18px 18px 6px 18px;
      background: rgba(26, 26, 36, 0.96);
      border: 1px solid rgba(180, 124, 252, 0.35);
      color: #f0f0f5;
      font-size: 13px;
      line-height: 1.55;
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(14px);
      animation: fadeIn 0.25s ease;
      position: relative;
    }

    .zemu-bubble::after {
      content: "";
      position: absolute;
      right: 52px;
      bottom: -7px;
      width: 14px;
      height: 14px;
      background: rgba(26, 26, 36, 0.96);
      border-right: 1px solid rgba(180, 124, 252, 0.35);
      border-bottom: 1px solid rgba(180, 124, 252, 0.35);
      transform: rotate(45deg);
    }

    .zemu-bubble strong {
      color: #d8c7ff;
    }

    @keyframes zemuFloat {
      0%, 100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-7px);
      }
    }

    @media (max-width: 900px) {
      .zemu-widget {
        right: 12px;
        bottom: 12px;
        width: 160px;
      }

      .zemu-character {
        width: 105px;
      }

      .zemu-bubble {
        width: 180px;
        font-size: 12px;
      }

      #ipucuBtn.zemu-hint-btn,
      #zemuBtn.zemu-ask-btn {
        font-size: 12px;
        padding: 9px 12px;
      }
    }
  </style>
</head>

<body>
  <header class="header">
    <div class="logo">Zemu</div>
    <div class="header-sub">İnteraktif Test Çözme</div>
  </header>

  <div class="test-selector" id="testSelector"></div>

  <div class="kart" id="kart">
    <div class="yukleniyor" id="yukleniyor">
      <div class="spinner"></div>
      Testler yükleniyor...
    </div>

    <div id="icerik" style="display:none;">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div class="soru-info">
        <span class="soru-no" id="soruNo">Soru 1</span>
        <span class="soru-sayac" id="soruSayac">1 / 10</span>
      </div>

      <div class="soru-metni" id="soruMetni"></div>

      <div class="secenekler" id="secenekler"></div>

      <div class="butonlar">
        <button class="btn btn-nav" id="geriBtn" title="Önceki soru">←</button>
        <button class="btn btn-primary" id="kontrolBtn">Kontrol Et</button>
        <button class="btn btn-nav" id="ileriBtn" title="Sonraki soru">→</button>
      </div>

      <div class="sonuc" id="sonuc"></div>

      <div class="skor-bar">
        <div class="skor-item dogru-skor">
          <div class="sayi" id="dogruSayi">0</div>
          <div class="etiket">Doğru</div>
        </div>
        <div class="skor-item yanlis-skor">
          <div class="sayi" id="yanlisSayi">0</div>
          <div class="etiket">Yanlış</div>
        </div>
        <div class="skor-item toplam-skor">
          <div class="sayi" id="toplamSayi">0</div>
          <div class="etiket">Toplam</div>
        </div>
      </div>
    </div>
  </div>

  <div class="zemu-widget">
    <div id="ipucuKutusu" class="zemu-bubble" style="display:none;"></div>
    
    <div class="zemu-actions">
      <button id="ipucuBtn" class="zemu-hint-btn" type="button">💡 İpucu Al</button>
      <button id="zemuBtn" class="zemu-ask-btn" type="button" style="display:none;">Zemu'ya Sor ✨</button>
    </div>
    
    <img src="./assets/zemu.png" alt="Zemu karakteri" class="zemu-character" />
  </div>

  <script>
    // ── DOM Elemanları ────────────────────
    const testSelector = document.getElementById("testSelector");
    const yukleniyorEl = document.getElementById("yukleniyor");
    const icerikEl = document.getElementById("icerik");
    const progressFill = document.getElementById("progressFill");
    const soruNoEl = document.getElementById("soruNo");
    const soruSayacEl = document.getElementById("soruSayac");
    const soruMetniEl = document.getElementById("soruMetni");
    const seceneklerEl = document.getElementById("secenekler");
    const sonucEl = document.getElementById("sonuc");
    const kontrolBtn = document.getElementById("kontrolBtn");
    const ipucuBtn = document.getElementById("ipucuBtn");
    const zemuBtn = document.getElementById("zemuBtn");
    const ipucuKutusu = document.getElementById("ipucuKutusu");
    const geriBtn = document.getElementById("geriBtn");
    const ileriBtn = document.getElementById("ileriBtn");
    const dogruSayiEl = document.getElementById("dogruSayi");
    const yanlisSayiEl = document.getElementById("yanlisSayi");
    const toplamSayiEl = document.getElementById("toplamSayi");

    // ── State ────────────────────────────
    let testler = [];
    let aktifTestIndex = 0;
    let aktifTest = null;
    let aktifSoruIndex = 0;
    let soru = null;
    let secilenCevap = "";
    let cevapKilitli = false;
    let skor = { dogru: 0, yanlis: 0 };

    // ── Markdown'dan HTML'e basit dönüştürücü ──
    function markdownToHtml(md) {
      // Görsel referanslarını img etiketine çevir
      let html = md.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" />');
      // Satır sonlarını <br> yap
      html = html.replace(/\n/g, '<br>');
      return html;
    }

    // ── Soru Gösterimi ───────────────────
    function soruyuGoster() {
      soru = aktifTest.sorular[aktifSoruIndex];
      const durum = soru.durum || "TEMİZ";
      const gorselModu =
        soru.soruGorselPath &&
        (durum === "BOZUK" || durum === "GÖRSEL_İÇERİKLİ");

      // Soru numarası + kategori badge
      const badgeClass = durum === "TEMİZ" ? "badge-temiz" : durum === "GÖRSEL_İÇERİKLİ" ? "badge-gorsel" : "badge-bozuk";
      const badgeLabel = durum === "GÖRSEL_İÇERİKLİ" ? "GÖRSEL" : durum;
      soruNoEl.innerHTML = `Soru ${soru.soruNo} <span class="kategori-badge ${badgeClass}">${badgeLabel}</span>`;
      soruSayacEl.textContent = `${aktifSoruIndex + 1} / ${aktifTest.sorular.length}`;

      // Progress bar
      const yuzde = ((aktifSoruIndex + 1) / aktifTest.sorular.length) * 100;
      progressFill.style.width = yuzde + "%";

      // Reset
      seceneklerEl.innerHTML = "";
      sonucEl.className = "sonuc";
      sonucEl.textContent = "";
      secilenCevap = "";
      cevapKilitli = false;

      // ── Kategoriye göre render ────────────
      if (durum === "BOZUK") {
        // BOZUK: Üstte görsel, altta sadece A/B/C/D butonları
        let gorselHtml = "";
        const gorselModu =
          soru.soruGorselPath &&
          soru.durum !== "TEMIZ" &&
          soru.durum !== "TEMİZ";

        if (gorselModu) {
          gorselHtml = `<div class="soru-gorsel"><img src="${soru.soruGorselPath}" alt="Soru ${soru.soruNo}" /></div>`;
        } else {
          gorselHtml = `<div class="gorsel-placeholder"><div class="icon">📷</div>Soru görseli henüz eklenmedi<br><small>q${soru.soruNo}.png dosyasını question_crops klasörüne ekleyin</small></div>`;
        }
        soruMetniEl.innerHTML = `<div class="bozuk-uyari">⚠ Bu sorunun metni düzgün okunamadı. Orijinal soru görseline bakarak cevaplayın.</div>${gorselHtml}`;
      }
      else if (durum === "GÖRSEL_İÇERİKLİ") {
        // GÖRSEL_İÇERİKLİ: Soru metni + görsel
        let html = markdownToHtml(soru.soruMetni);
        if (soru.soruGorselPath) {
          html += `<div class="soru-gorsel" style="margin-top:12px"><img src="${soru.soruGorselPath}" alt="Soru ${soru.soruNo}" /></div>`;
        }
        soruMetniEl.innerHTML = html;
      }
      else {
        // TEMİZ: Normal metin
        soruMetniEl.innerHTML = markdownToHtml(soru.soruMetni);
      }

      // ── Seçenekleri oluştur ───────────────
      for (const harf of ["A", "B", "C", "D"]) {
        const metin = soru.secenekler ? soru.secenekler[harf] : "";

        const div = document.createElement("div");
        div.className = "secenek";
        div.id = `secenek-${harf}`;

        const harfDiv = document.createElement("div");
        harfDiv.className = "harf";
        harfDiv.textContent = harf;

        const metinDiv = document.createElement("div");
        // BOZUK sorularda şık metni boş olabilir, sadece harf göster
        if (!gorselModu && metin && metin.trim()) {
          metinDiv.innerHTML = markdownToHtml(metin);
        }

        div.appendChild(harfDiv);
        div.appendChild(metinDiv);

        div.addEventListener("click", () => {
          if (cevapKilitli) return;
          document.querySelectorAll(".secenek").forEach(el => el.classList.remove("selected"));
          div.classList.add("selected");
          secilenCevap = harf;
        });

        seceneklerEl.appendChild(div);
      }

      geriBtn.disabled = aktifSoruIndex === 0;
      ileriBtn.disabled = aktifSoruIndex === aktifTest.sorular.length - 1;

      ipucuKutusu.style.display = "none";
      ipucuKutusu.textContent = "";
      zemuBtn.style.display = "none";
    }

    // ── Test Seçimi ──────────────────────
    function testleriGoster() {
      testSelector.innerHTML = "";
      testler.forEach((test, i) => {
        const btn = document.createElement("button");
        btn.className = "test-btn" + (i === aktifTestIndex ? " active" : "");
        btn.textContent = test.testAdi;
        btn.id = `test-btn-${i}`;
        btn.addEventListener("click", () => {
          aktifTestIndex = i;
          aktifTest = testler[i];
          aktifSoruIndex = 0;
          skor = { dogru: 0, yanlis: 0 };
          skoruGuncelle();
          soruyuGoster();
          // Aktif buton stilini güncelle
          document.querySelectorAll(".test-btn").forEach(el => el.classList.remove("active"));
          btn.classList.add("active");
        });
        testSelector.appendChild(btn);
      });
    }

    // ── Skor Güncelle ────────────────────
    function skoruGuncelle() {
      dogruSayiEl.textContent = skor.dogru;
      yanlisSayiEl.textContent = skor.yanlis;
      toplamSayiEl.textContent = skor.dogru + skor.yanlis;
    }

    // ── Veri Yükle ───────────────────────
    async function veriyiYukle() {
      try {
        const response = await fetch("./data/tests_with_hints.json");
        if (!response.ok) throw new Error("JSON dosyası bulunamadı");
        testler = await response.json();

        if (testler.length === 0) {
          yukleniyorEl.innerHTML = "Hiç test bulunamadı.";
          return;
        }

        aktifTest = testler[0];
        aktifSoruIndex = 0;

        testleriGoster();

        yukleniyorEl.style.display = "none";
        icerikEl.style.display = "block";

        soruyuGoster();
      } catch (error) {
        yukleniyorEl.innerHTML = `
          <div style="color: var(--red);">
            ⚠️ Veri yüklenemedi<br>
            <span style="font-size:13px; color: var(--text-secondary);">
              tests_with_images.json bulunamadı. Önce scriptleri çalıştırın.
            </span>
          </div>
        `;
        console.error(error);
      }
    }

    // ── Event Listeners ──────────────────
    kontrolBtn.addEventListener("click", () => {
      if (cevapKilitli) return;

      if (!secilenCevap) {
        sonucEl.textContent = "Önce bir şık seç!";
        sonucEl.className = "sonuc yanlis";
        return;
      }

      cevapKilitli = true;

      if (secilenCevap === soru.dogruCevap) {
        sonucEl.textContent = "Doğru cevap! 🎉";
        sonucEl.className = "sonuc dogru";
        document.getElementById(`secenek-${secilenCevap}`).classList.add("dogru-goster");
        skor.dogru++;
      } else {
        sonucEl.textContent = `Yanlış! Doğru cevap: ${soru.dogruCevap}`;
        sonucEl.className = "sonuc yanlis";
        document.getElementById(`secenek-${secilenCevap}`).classList.add("yanlis-goster");
        // Doğru cevabı göster
        const dogruEl = document.getElementById(`secenek-${soru.dogruCevap}`);
        if (dogruEl) dogruEl.classList.add("dogru-goster");
        skor.yanlis++;
      }

      skoruGuncelle();
    });

    geriBtn.addEventListener("click", () => {
      if (aktifSoruIndex > 0) {
        aktifSoruIndex--;
        soruyuGoster();
      }
    });

    ileriBtn.addEventListener("click", () => {
      if (aktifSoruIndex < aktifTest.sorular.length - 1) {
        aktifSoruIndex++;
        soruyuGoster();
      }
    });

    ipucuBtn.addEventListener("click", () => {
      if (!soru) return;

      const ipucuMetni = soru.ipucu || "Bu soru için henüz ipucu yok.";
      ipucuKutusu.innerHTML = `<strong>💡 Zemu'dan ipucu:</strong><br>${markdownToHtml(ipucuMetni)}`;
      ipucuKutusu.style.display = "block";
      
      if (soru.ipucu_ai) {
        zemuBtn.style.display = "inline-block";
      } else {
        zemuBtn.style.display = "none";
      }
    });

    zemuBtn.addEventListener("click", () => {
      if (!soru || !soru.ipucu_ai) return;

      ipucuKutusu.innerHTML = `<strong>✨ Zemu açıklıyor:</strong><br>${markdownToHtml(soru.ipucu_ai)}`;
      zemuBtn.style.display = "none";
    });

    // Klavye kısayolları
    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") geriBtn.click();
      if (e.key === "ArrowRight") ileriBtn.click();
      if (e.key === "Enter") kontrolBtn.click();
      if (e.key >= "1" && e.key <= "4") {
        const harfler = ["A", "B", "C", "D"];
        const el = document.getElementById(`secenek-${harfler[parseInt(e.key) - 1]}`);
        if (el) el.click();
      }
    });

    veriyiYukle();
  </script>
</body>

</html>
