<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zemu — Ders Seçimi</title>
  <link rel="icon" href="assets/zemu.png" type="image/png">
  <meta name="description" content="Zemu - Yapay Zeka Destekli Öğrenme Asistanı" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary: #EEF6FB;
      --bg-card: #FFFFFF;
      --text-primary: #2E3A4A;
      --text-secondary: #7A8797;
      --accent: #B9DCFF;
      --accent-glow: rgba(185, 220, 255, 0.35);
      --border: #E2E8F0;
      --radius: 20px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }

    /* ── Header ─────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #FF8FB3, #FFB6D0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }

    .header-sub {
      color: #4a5568;
      font-size: 16px;
      font-weight: 600;
    }

    /* ── Ders Seçimi ────────────────── */
    .ders-secim-ekrani {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 30px;
      padding: 0 20px;
      width: 100%;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    
    @media (max-width: 600px) {
      .ders-secim-ekrani {
        grid-template-columns: 1fr;
      }
    }

    .ders-kart {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 30px;
      font-size: 20px;
      font-weight: 800;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,0.04);
      min-width: 220px;
      text-align: center;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 140px;
    }

    .ders-kart:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(122, 184, 245, 0.1);
      border-color: #FFB6D0;
    }
    
    .ders-kart.disabled {
      opacity: 0.8;
      cursor: not-allowed;
    }
    
    .ders-kart.disabled:hover {
      border-color: var(--border);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.04);
    }
    
    .yakinda-badge {
      display: block;
      margin-top: 10px;
      font-size: 11px;
      font-weight: 700;
      color: #FF8FB3;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ── Zemu Mascot ────────────────── */
    .zemu-mascot-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 50px;
    }

    .zemu-bubble {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 16px 24px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.5;
      text-align: center;
      position: relative;
      max-width: 320px;
    }

    /* Konuşma balonu ucu */
    .zemu-bubble::before {
      content: '';
      position: absolute;
      bottom: -9px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 9px solid transparent;
      border-right: 9px solid transparent;
      border-top: 9px solid var(--border);
    }
    
    .zemu-bubble::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid var(--bg-card);
    }

    .zemu-character {
      width: 130px;
      height: auto;
      animation: gentle-bounce 3s ease-in-out infinite;
      filter: drop-shadow(0 15px 25px rgba(0,0,0,0.15));
    }

    @keyframes gentle-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">Zemu</div>
    <div class="header-sub">Yapay Zeka Destekli Öğrenme Asistanı</div>
  </header>

  <div class="ders-secim-ekrani" id="dersSecimEkrani"></div>

  <div class="zemu-mascot-area">
    <div class="zemu-bubble">Merhaba, Ben Zemu! Yapay Zeka Destekli Öğrenme Asistanınım. Bugün hangi dersi çalışmak istersin? </div>
    <img src="./assets/zemu.png" alt="Zemu" class="zemu-character" />
  </div>

  <script>
    const dersSecimEkrani = document.getElementById("dersSecimEkrani");

    const derslerListesi = [
      { id: "matematik", isim: "Matematik" },
      { id: "turkce", isim: "Türkçe" },
      { id: "fen", isim: "Fen Bilimleri" },
      { id: "sosyal", isim: "Sosyal Bilgiler" }
    ];

    function anaEkraniYukle() {
      dersSecimEkrani.innerHTML = "";
      derslerListesi.forEach(ders => {
        const btn = document.createElement("div");
        btn.className = "ders-kart";
        
        if (ders.id !== "matematik") {
          btn.classList.add("disabled");
          btn.innerHTML = `${ders.isim} <span class="yakinda-badge">Yakında eklenecek</span>`;
        } else {
          btn.textContent = ders.isim;
        }
        
        btn.addEventListener("click", () => {
          if (ders.id !== "matematik") {
            alert(ders.isim + " dersi çok yakında Zemu'ya eklenecek! Şu anlık Matematik ile devam edebilirsin.");
            return;
          }
          window.location.href = `sinif.html?ders=${ders.id}`;
        });
        
        dersSecimEkrani.appendChild(btn);
      });
    }

    anaEkraniYukle();
  </script>
</body>
</html>
